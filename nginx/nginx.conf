events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    server {
        listen 80;
        server_name drsscribe.com www.drsscribe.com app.drsscribe.com data-science-demo.drsscribe.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name drsscribe.com www.drsscribe.com;

        ssl_certificate /etc/letsencrypt/live/drsscribe.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/drsscribe.com/privkey.pem;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

        location /dev-tools/ {
            proxy_pass http://dev-tools:8090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /agent-chat/ {
            proxy_pass http://dev-tools:8090/agent-chat/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /agent-chat {
            return 301 /agent-chat/?$args;
        }

        location / {
            set $parent_upstream http://parent-website:3000;
            proxy_pass $parent_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name app.drsscribe.com;

        ssl_certificate /etc/letsencrypt/live/drsscribe.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/drsscribe.com/privkey.pem;

        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

        client_max_body_size 500M;
        gzip on;
        gzip_types text/plain application/json application/javascript text/css;

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Public media files served from MinIO (article images, etc.)
        location /media/ {
            set $minio_upstream http://minio:9000;
            rewrite ^/media/(.*)$ /drscribe-audio/$1 break;
            proxy_pass $minio_upstream;
            proxy_set_header Host minio;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-meta-server-side-encryption;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
        }

        location /ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # index + bootstrap — no cache, always fresh
        location ~* ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|manifest\.json)$ {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
            expires 0;
        }

        location / {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
        }
    }

    # ── Data Science Demo Platform ───────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name data-science-demo.drsscribe.com;

        ssl_certificate /etc/letsencrypt/live/drsscribe.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/drsscribe.com/privkey.pem;

        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # WebSocket support — required for Streamlit live updates
        location / {
            set $ds_upstream http://ds-app:8501;
            proxy_pass $ds_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
    # ─────────────────────────────────────────────────────────────────────────
}
