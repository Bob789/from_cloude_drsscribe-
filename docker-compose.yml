services:
  # === Parent Website (Next.js) ===
  parent-website:
    build:
      context: ./parent-website
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
        NEXT_PUBLIC_FEATURE_FORUM: "false"
        NEXT_PUBLIC_FEATURE_EXPERTS: "false"
        NEXT_PUBLIC_FEATURE_PRODUCT: "false"
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: "Npj9FGpWwCUZpch99KTy0PX23uhMosGUzOn3BiYtIac"
    container_name: medscribe-parent
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_MEDSCRIBE_URL=https://app.drsscribe.com
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - DEV_TOOLS_URL=http://medscribe-dev-tools:8090
      - DEV_TOOLS_TOKEN=${DEV_TOOLS_TOKEN:-dev-token-change-me}
    networks:
      - medscribe-network
    restart: unless-stopped

  # === Backend API ===
  backend:
    build: ./backend
    container_name: medscribe-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Allow backend to control dev-tools container from cpanel (dev only)
      - /var/run/docker.sock:/var/run/docker.sock
    # Add appuser to root group so it can access the docker socket (dev only)
    group_add:
      - "0"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PARENT_WEBSITE_URL=http://localhost:3001
    networks:
      - medscribe-network

  # === Celery Worker ===
  celery-worker:
    build: ./backend
    container_name: medscribe-celery
    env_file: .env
    depends_on:
      - backend
      - redis
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    networks:
      - medscribe-network

  # === Frontend (Flutter Web) ===
  frontend:
    build: 
      context: ./frontend
      args:
        BUILD_MODE: debug
    container_name: medscribe-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - medscribe-network

  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: medscribe-postgres
    environment:
      POSTGRES_DB: medscribe
      POSTGRES_USER: medscribe
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_db_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medscribe"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medscribe-network

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: medscribe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medscribe-network

  # === MinIO (S3 Compatible Storage) ===
  minio:
    image: minio/minio:latest
    container_name: medscribe-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-changeme_minio_password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medscribe-network

  # === MinIO bucket bootstrap (creates bucket + sets public read policy) ===
  # Runs once on `up`, makes hero images publicly readable so the website's
  # <img> tags work without signed URLs. Idempotent — safe to re-run.
  minio-init:
    image: minio/mc:latest
    container_name: medscribe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-changeme_minio_password}
      S3_BUCKET: ${S3_BUCKET:-drscribe-audio}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set download local/$$S3_BUCKET &&
      echo 'MinIO bucket bootstrap complete: $$S3_BUCKET is publicly readable'
      "
    networks:
      - medscribe-network
    restart: "no"

  # === Meilisearch ===
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: medscribe-search
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-changeme_meilisearch_key}
    volumes:
      - meili_data:/meili_data
    networks:
      - medscribe-network

  # === Dev-Tools (internal) — page screenshots & DOM flattening for AI debugging ===
  # Uses Playwright + Chromium. Heavy image; only start when needed:
  #   docker-compose --profile dev-tools up -d dev-tools
  dev-tools:
    build: ./dev-tools
    container_name: medscribe-dev-tools
    ports:
      - "8090:8090"
    environment:
      - DEV_TOOLS_TOKEN=${DEV_TOOLS_TOKEN:-dev-token-change-me}
    profiles:
      - dev-tools
    networks:
      - medscribe-network
    restart: unless-stopped

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: medscribe-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/letsencrypt/live/drsscribe.com:ro
    depends_on:
      - backend
      - frontend
    networks:
      - medscribe-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:

networks:
  medscribe-network:
    driver: bridge
