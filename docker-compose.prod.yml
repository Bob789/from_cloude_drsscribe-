version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medscribe-backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always
    networks:
      - medscribe-network

  celery-worker:
    build: ./backend
    container_name: medscribe-celery
    env_file: .env
    depends_on:
      - backend
      - redis
    command: celery -A app.celery_app worker --loglevel=warning --concurrency=4
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    restart: always
    networks:
      - medscribe-network

  frontend:
    build: ./frontend
    container_name: medscribe-frontend
    depends_on:
      - backend
    restart: always
    networks:
      - medscribe-network

  postgres:
    image: postgres:16-alpine
    container_name: medscribe-postgres
    environment:
      POSTGRES_DB: medscribe
      POSTGRES_USER: medscribe
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medscribe"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: always
    networks:
      - medscribe-network

  redis:
    image: redis:7-alpine
    container_name: medscribe-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - medscribe-network

  minio:
    image: minio/minio:latest
    container_name: medscribe-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_KMS_SECRET_KEY: "medscribe-key:${MINIO_ENCRYPTION_KEY}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    networks:
      - medscribe-network

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: medscribe-search
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    restart: always
    networks:
      - medscribe-network

  nginx:
    image: nginx:alpine
    container_name: medscribe-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - medscribe-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:

networks:
  medscribe-network:
    driver: bridge
