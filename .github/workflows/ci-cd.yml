name: CI → CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Run backend tests
  # ─────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: medscribe
          POSTGRES_PASSWORD: medscribe
          POSTGRES_DB: medscribe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://medscribe:medscribe@localhost:5432/medscribe_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-key-for-ci-only-32chars
      JWT_ALGORITHM: HS256
      ENVIRONMENT: test
      CORS_ORIGINS: 'http://localhost:3000,http://localhost:3001'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Initialize test database
        run: |
          cd backend
          python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy import text
          import os
          import app.models  # noqa: F401 - ensures all models are registered
          from app.database import Base

          DB_URL = os.environ['DATABASE_URL']
          engine = create_async_engine(DB_URL, echo=False)

          async def init():
              async with engine.begin() as conn:
                  # Create sequences first (referenced in model server_defaults)
                  for table in ('patients', 'visits', 'summaries'):
                      await conn.execute(text(f\"CREATE SEQUENCE IF NOT EXISTS {table}_display_id_seq\"))
                  # Create all tables
                  await conn.run_sync(Base.metadata.create_all)
          asyncio.run(init())
          "
          python -m alembic stamp head

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --ignore=tests/load --junitxml=test-results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/test-results.xml

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to GCP — only after tests pass
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: test                     # ← only runs if 'test' job passed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/drscribe

            echo "=== Pulling latest code ==="
            git fetch pc main
            git reset --hard pc/main

            echo "=== Rebuilding changed services (before migrations so new code is used) ==="
            sudo docker-compose -f docker-compose.prod.yml build --no-cache backend parent-website frontend
            sudo docker-compose -f docker-compose.prod.yml --profile ds-platform build --no-cache ds-app

            echo "=== Running migrations (using freshly built backend image) ==="
            sudo docker-compose -f docker-compose.prod.yml run --rm backend \
              bash -c "cd /app && PYTHONPATH=/app python -m alembic upgrade head"

            echo "=== Restarting services ==="
            sudo docker-compose -f docker-compose.prod.yml up -d --no-deps backend parent-website frontend
            sudo docker-compose -f docker-compose.prod.yml restart nginx

            echo "=== Starting ds-platform ==="
            sudo docker-compose -f docker-compose.prod.yml --profile ds-platform up -d

            echo "=== Health check ==="
            sleep 15
            HTTP=$(curl -sk -o /dev/null -w "%{http_code}" https://app.drsscribe.com/api/health)
            if [ "$HTTP" != "200" ]; then
              echo "Health check FAILED: HTTP $HTTP"
              exit 1
            fi
            echo "Deploy complete ✓"
