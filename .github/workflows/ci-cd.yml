name: CI → CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Run backend tests
  # ─────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: medscribe
          POSTGRES_PASSWORD: medscribe
          POSTGRES_DB: medscribe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://medscribe:medscribe@localhost:5432/medscribe_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      JWT_ALGORITHM: HS256
      ENVIRONMENT: test
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --ignore=tests/load

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to GCP — only after tests pass
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: test                     # ← only runs if 'test' job passed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/drscribe

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Running migrations ==="
            sudo docker-compose -f docker-compose.prod.yml run --rm backend \
              bash -c "cd /app && PYTHONPATH=/app python -m alembic upgrade head"

            echo "=== Rebuilding changed services ==="
            sudo docker-compose -f docker-compose.prod.yml build --no-cache backend parent-website frontend

            echo "=== Restarting services ==="
            sudo docker-compose -f docker-compose.prod.yml up -d --no-deps backend parent-website frontend

            echo "=== Health check ==="
            sleep 15
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health)
            if [ "$HTTP" != "200" ]; then
              echo "Health check FAILED: HTTP $HTTP"
              exit 1
            fi
            echo "Deploy complete ✓"
