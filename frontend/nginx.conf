server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500M;
    
    # Allow popups for Google Auth
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    # Strip Referrer on cross-origin image requests (prevents Google CDN 429)
    add_header Referrer-Policy "no-referrer";

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        client_max_body_size 500M;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cache for main entry files (they change on rebuild)
    location ~* ^/(main\.dart\.js|flutter_bootstrap\.js|flutter\.js|index\.html|version\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Cache static assets with hashes (fonts, canvaskit, images)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache versioned JS/CSS in assets folder
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
