name: medscribe_ai
description: MedScribe AI - Medical Visit Transcription & Summarization
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.7
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  riverpod: ^2.5.0
  go_router: ^14.2.0
  intl: ^0.20.2
  google_sign_in: ^6.2.0
  shared_preferences: ^2.3.0
  json_annotation: ^4.9.0
  web_socket_channel: ^3.0.0
  url_launcher: ^6.3.0
  file_picker: ^8.0.0
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
