<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>DoctorScribe — Dev Tools</title>
<meta name="robots" content="noindex,nofollow">
<style>
  body { font-family: system-ui, -apple-system, sans-serif; background:#0b0d10; color:#eaeaea; margin:0; padding:24px; }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:#8a93a0; margin-bottom:24px; font-size:13px; }
  .card { background:#11151a; border:1px solid #222; border-radius:8px; padding:20px; max-width:780px; margin:0 auto; }
  label { display:block; font-size:12px; color:#9aa3b0; margin:12px 0 4px; }
  input, select { width:100%; box-sizing:border-box; padding:10px; background:#1a1f26; color:#eaeaea;
                  border:1px solid #2a2f36; border-radius:4px; font-size:13px; font-family:inherit; }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  .actions { margin-top:20px; display:flex; gap:12px; }
  button { background:#2a4060; color:#fff; border:0; padding:10px 18px; border-radius:4px;
           font-size:13px; cursor:pointer; font-weight:600; }
  button:hover { background:#3a5a80; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.secondary { background:#1a1f26; border:1px solid #2a2f36; }
  .status { margin-top:16px; padding:10px; border-radius:4px; background:#1a1f26;
            border:1px solid #2a2f36; font-size:12px; min-height:18px; }
  .status.error { background:#3a1a1a; border-color:#5a2a2a; color:#ffb8b8; }
  .status.ok { background:#1a3a2a; border-color:#2a5a3a; color:#b8ffd0; }
  .hint { font-size:11px; color:#6a7280; margin-top:6px; }
  a { color:#8ab4ff; }
</style>
</head>
<body>
<div class="card">
  <h1>🛠️ DoctorScribe Dev Tools</h1>
  <div class="sub">צילום מסך מלא + Flatten HTML של עמודי Flutter Web — לצרכי דיבוג ו-AI.</div>

  <label>URL לצילום</label>
  <input id="url" type="text" value="http://medscribe-frontend/dashboard">
  <div class="hint">משתמש ברשת Docker הפנימית. לדפדוף חיצוני: <code>https://app.drsscribe.com/...</code></div>

  <div class="row">
    <div>
      <label>רוחב Viewport</label>
      <input id="vw" type="number" value="1440">
    </div>
    <div>
      <label>גובה Viewport</label>
      <input id="vh" type="number" value="900">
    </div>
    <div>
      <label>המתנה אחרי טעינה (ms)</label>
      <input id="wait" type="number" value="3000">
    </div>
  </div>

  <label>JWT Access Token (אופציונלי — לדפים מאחורי auth)</label>
  <input id="jwt" type="text" placeholder="eyJhbGc...">
  <div class="hint">קח מ-DevTools → Application → Local Storage → access_token</div>

  <label>Dev-Tools Token</label>
  <input id="devtoken" type="password" placeholder="DEV_TOOLS_TOKEN">
  <div class="hint">מתוך משתנה הסביבה <code>DEV_TOOLS_TOKEN</code> ב-<code>.env</code></div>

  <label>שירות Dev-Tools</label>
  <input id="endpoint" type="text" value="http://localhost:8090">

  <div class="actions">
    <button id="btnShot">📸 Screenshot (PNG)</button>
    <button id="btnFlat" class="secondary">📄 Flatten to HTML</button>
  </div>

  <div id="status" class="status">מוכן.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const status = $('status');

function setStatus(msg, kind) {
  status.textContent = msg;
  status.className = 'status' + (kind ? ' ' + kind : '');
}

function buildBody() {
  return {
    url: $('url').value.trim(),
    viewport_width: parseInt($('vw').value, 10) || 1440,
    viewport_height: parseInt($('vh').value, 10) || 900,
    wait_ms: parseInt($('wait').value, 10) || 0,
    auth_token: $('jwt').value.trim() || null,
  };
}

async function capture(path, filename) {
  const endpoint = $('endpoint').value.replace(/\/$/, '');
  const token = $('devtoken').value.trim();
  if (!token) { setStatus('חסר Dev-Tools Token', 'error'); return; }
  setStatus('מצלם... זה יכול לקחת כמה שניות.', '');
  try {
    const res = await fetch(endpoint + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Dev-Token': token },
      body: JSON.stringify(buildBody()),
    });
    if (!res.ok) {
      const t = await res.text();
      setStatus('שגיאה ' + res.status + ': ' + t.slice(0, 200), 'error');
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    // Also open in new tab
    window.open(url, '_blank');
    setStatus('הצליח — הקובץ הורד ונפתח בלשונית חדשה.', 'ok');
  } catch (e) {
    setStatus('כשל: ' + e.message + ' — בדוק שה-Dev-Tools רץ (docker-compose --profile dev-tools up -d)', 'error');
  }
}

$('btnShot').onclick = () => capture('/capture/screenshot', 'screenshot.png');
$('btnFlat').onclick = () => capture('/capture/flatten', 'flatten.html');

// Auto-fill JWT from current site if available
try {
  const t = localStorage.getItem('access_token');
  if (t) $('jwt').value = t;
} catch (_) {}
</script>
</body>
</html>
