groups:
  - name: medscribe_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(error_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 5%"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency above 5 seconds"

      - alert: DiskUsageHigh
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 80%"

      - alert: STTFailureRate
        expr: increase(error_total{type="STTError"}[1h]) > 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "More than 3 STT failures in the last hour"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
